baseURL = 'https://blog.aymantech.net'
languageCode = 'en-us'
title = 'Mohamed Ayman | DevOps & Infrastructure'
theme = 'PaperMod'

[params]
    env = 'production'
    description = 'DevOps Engineer specializing in Kubernetes, Terraform, and Automation.'
    author = 'Mohamed Ayman'

    [params.profileMode]
        enabled = true
        title = 'Mohamed Ayman'
        subtitle = 'DevOps & Infrastructure Engineer | Based in the Netherlands 🇳🇱'
        imageUrl = '' # Add a link to your photo later if you want
        imageTitle = 'Ayman'
        
        [[params.profileMode.buttons]]
            name = 'View CV'
            url = '/cv'
        [[params.profileMode.buttons]]
            name = 'Blog / TIL'
            url = '/posts'
        [[params.profileMode.buttons]]
            name = 'Project Board'
            url = '/kanban'

    [[params.socialIcons]]
        name = 'github'
        url = 'https://github.com/moabdelbasset'
    [[params.socialIcons]]
        name = 'linkedin'
        url = 'https://www.linkedin.com/in/mohamed-abdelbasset-b29b5b66/'

[menu]
    [[menu.main]]
        identifier = 'posts'
        name = 'Posts'
        url = '/posts/'
        weight = 10
    [[menu.main]]
        identifier = 'board'
        name = 'Board'
        url = '/kanban/'
        weight = 15
    [[menu.main]]
        identifier = 'tags'
        name = 'Tags'
        url = '/tags/'
        weight = 20

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true
