name: Validate Hugo site

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build site
        run: hugo --gc --minify --printPathWarnings

      - name: Verify primary outputs
        run: |
          test -s public/index.html
          test -s public/index.json
          test -s public/sitemap.xml
          test -s public/robots.txt

      - name: Check internal links and assets
        run: python3 scripts/check-internal-links.py public
